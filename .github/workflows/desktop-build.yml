name: Build Desktop Application

on:
  push:
    branches: [main, tauri-rust-desktop-rewrite]
    tags: ['v*']
  pull_request:
    branches: [main, tauri-rust-desktop-rewrite]
  workflow_dispatch:

jobs:
  build:
    name: Build Desktop App
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend for Desktop
        run: pnpm --filter @rolerover/desktop run build

      - name: Set up Tauri Signing Key (Dummy for CI without secrets)
        run: |
          New-Item -Path "desktop/.tauri" -ItemType Directory -Force
          Set-Content -Path "desktop/.tauri/updater.key" -Value "untrusted comment: minisign secret key`nRWQk5Iwp1GnPfwN+pL46+6/lXJ0yJ9Bv1t1Y2nS8A1L+M3e/r30wE8d3jO1O5hD2pG/x3s03I2zY1Eki/R6SjJ3+R7tB/9wX/mO1/1A="
        shell: powershell
        if: env.TAURI_SIGNING_PRIVATE_KEY == ''
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build Tauri Desktop
        run: pnpm run build:tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rolerover-desktop-windows
          path: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
